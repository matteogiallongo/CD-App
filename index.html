// ─── STORAGE ──────────────────────────────────────────────────────────────────
const persist = async (k, v) => { try { localStorage.setItem(k, JSON.stringify(v)); } catch {} };
const restore = async (k, fb) => { try { const v = localStorage.getItem(k); return v ? JSON.parse(v) : fb; } catch { return fb; } };
const makeKey = (p, ck, id) => `${p}__${ck}__${id}`;
const makeCK = (tid, c) => `c${c}__${tid}`;

// ─── UI ATOMS ─────────────────────────────────────────────────────────────────
const Pill = ({ cat, sm }) => {
  const cc = CAT[cat] || { c: "#666", l: cat };
  return (
    <span style={{
      background: `${cc.c}18`, color: cc.c, border: `1px solid ${cc.c}38`,
      padding: sm ? "1px 6px" : "2px 9px", borderRadius: "3px",
      fontSize: sm ? "9px" : "10px", fontFamily: "monospace",
      textTransform: "uppercase", letterSpacing: "0.08em", fontWeight: 700, whiteSpace: "nowrap",
    }}>{cc.l}</span>
  );
};

const Ring = ({ pct, size, col, children }) => {
  const r = size / 2 - 5, circ = 2 * Math.PI * r;
  return (
    <div style={{ position: "relative", width: size, height: size, flexShrink: 0 }}>
      <svg width={size} height={size} style={{ transform: "rotate(-90deg)", position: "absolute" }}>
        <circle cx={size/2} cy={size/2} r={r} fill="none" stroke="#1e1e1e" strokeWidth="3.5" />
        <circle cx={size/2} cy={size/2} r={r} fill="none" stroke={col} strokeWidth="3.5"
          strokeDasharray={`${(pct/100)*circ} ${circ}`} strokeLinecap="round"
          style={{ transition: "stroke-dasharray 0.5s ease" }} />
      </svg>
      <div style={{ position: "absolute", inset: 0, display: "flex", alignItems: "center", justifyContent: "center" }}>
        {children}
      </div>
    </div>
  );
};

// ─── HOME ─────────────────────────────────────────────────────────────────────
function HomeView({ tema, percorso, cl, cycle, setTab, log, stats, checkDates }) {
  const items = percorso === "p1" ? tema.p1 : tema.p2;
  const done = items.filter(i => cl[makeKey(percorso, makeCK(tema.id, cycle), i.id)]).length;
  const pct = items.length ? Math.round((done / items.length) * 100) : 0;
  const next = items.find(i => !cl[makeKey(percorso, makeCK(tema.id, cycle), i.id)]);

  // Last check date for this tema+cycle
  const prefix = makeKey(percorso, makeCK(tema.id, cycle), "");
  const lastCheckTs = Object.entries(checkDates)
    .filter(([k]) => k.startsWith(prefix) && cl[k])
    .map(([, v]) => v).sort().reverse()[0] || null;

  const catProgress = Object.keys(CAT).map(cat => {
    const ci = items.filter(i => i.cat === cat);
    const cd = ci.filter(i => cl[makeKey(percorso, makeCK(tema.id, cycle), i.id)]).length;
    return { cat, total: ci.length, done: cd };
  }).filter(c => c.total > 0);

  return (
    <div style={{ padding: "18px 18px 0" }}>
      {/* Hero */}
      <div style={{ background: `linear-gradient(135deg, ${tema.c}18 0%, ${G.s1} 55%)`, border: `1px solid ${tema.c}30`, borderRadius: "14px", padding: "18px", marginBottom: "12px" }}>
        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start", gap: "12px" }}>
          <div style={{ flex: 1 }}>
            <div style={{ display: "flex", gap: "8px", alignItems: "center", marginBottom: "7px", flexWrap: "wrap" }}>
              <span style={{ fontSize: "10px", color: tema.c, fontFamily: "monospace", textTransform: "uppercase", letterSpacing: "0.15em" }}>Tema {tema.n}/24</span>
              <span style={{ fontSize: "10px", color: G.muted, fontFamily: "monospace", border: `1px solid ${G.border}`, padding: "1px 6px", borderRadius: "3px" }}>Ciclo {cycle}</span>
              {lastCheckTs && <span style={{ fontSize: "9px", color: G.muted, fontFamily: "monospace" }}>· ultimo: {lastCheckTs}</span>}
            </div>
            <div style={{ fontSize: "clamp(16px,4vw,21px)", fontWeight: 400, color: G.text, letterSpacing: "-0.02em", lineHeight: 1.2, marginBottom: "4px" }}>{tema.titolo}</div>
            <div style={{ fontSize: "11px", color: G.sub, fontStyle: "italic" }}>{tema.tagline}</div>
          </div>
          <Ring pct={pct} size={60} col={tema.c}>
            <div style={{ textAlign: "center" }}>
              <div style={{ fontSize: "13px", fontWeight: 700, color: tema.c, fontFamily: "monospace", lineHeight: 1 }}>{done}</div>
              <div style={{ fontSize: "8px", color: G.muted, fontFamily: "monospace" }}>/{items.length}</div>
            </div>
          </Ring>
        </div>

        {next && pct < 100 && (
          <div style={{ marginTop: "12px", padding: "10px 12px", background: "#00000050", borderRadius: "8px" }}>
            <div style={{ fontSize: "9px", color: G.muted, fontFamily: "monospace", textTransform: "uppercase", letterSpacing: "0.1em", marginBottom: "4px" }}>→ prossimo</div>
            <div style={{ display: "flex", alignItems: "center", gap: "7px", flexWrap: "wrap" }}>
              <Pill cat={next.cat} sm />
              <span style={{ fontSize: "11px", color: G.dim, lineHeight: 1.5, flex: 1 }}>{next.txt.slice(0, 70)}{next.txt.length > 70 ? "…" : ""}</span>
              <span style={{ fontSize: "9px", color: G.muted, fontFamily: "monospace", border: `1px solid ${G.border}`, padding: "1px 5px", borderRadius: "3px", whiteSpace: "nowrap" }}>{CAT[next.cat]?.[percorso === "p1" ? "t1" : "t2"]}</span>
            </div>
          </div>
        )}
        {pct === 100 && (
          <div style={{ marginTop: "12px", padding: "10px 12px", background: "#0a2a0a", borderRadius: "8px", border: "1px solid #6BBF8E40" }}>
            <div style={{ fontSize: "11px", color: "#6BBF8E" }}>✓ Tema completato — vai in Settimana per la riflessione</div>
          </div>
        )}
        <button onClick={() => setTab("settimana")} style={{ marginTop: "14px", display: "flex", alignItems: "center", gap: "7px", background: tema.c, color: "#000", border: "none", padding: "9px 16px", borderRadius: "7px", cursor: "pointer", fontSize: "11px", fontFamily: "monospace", fontWeight: 700, textTransform: "uppercase", letterSpacing: "0.06em" }}>
          Apri settimana <ChevronRight size={13} />
        </button>
      </div>

      {/* Progresso per area */}
      <div style={{ background: G.s1, border: `1px solid ${G.border}`, borderRadius: "10px", padding: "14px", marginBottom: "12px" }}>
        <div style={{ fontSize: "10px", color: G.muted, fontFamily: "monospace", textTransform: "uppercase", letterSpacing: "0.12em", marginBottom: "10px" }}>Progresso per area</div>
        <div style={{ display: "grid", gap: "7px" }}>
          {catProgress.map(({ cat, total, done }) => (
            <div key={cat} style={{ display: "flex", alignItems: "center", gap: "8px" }}>
              <Pill cat={cat} sm />
              <div style={{ flex: 1, height: "4px", background: G.s3, borderRadius: "2px", overflow: "hidden" }}>
                <div style={{ height: "100%", borderRadius: "2px", width: `${(done/total)*100}%`, background: CAT[cat].c, transition: "width 0.4s ease" }} />
              </div>
              <span style={{ fontSize: "10px", color: G.muted, fontFamily: "monospace", minWidth: "28px" }}>{done}/{total}</span>
            </div>
          ))}
        </div>
      </div>

      {/* Stats */}
      <div style={{ display: "grid", gridTemplateColumns: "repeat(3,1fr)", gap: "8px", marginBottom: "12px" }}>
        {[
          { label: "cicli", val: stats.cicliTotali, col: G.gold },
          { label: "contenuti", val: stats.contenuti, col: CAT.contenuto.c },
          { label: "temi ✓", val: stats.temiDone, col: "#6BBF8E" },
        ].map((s, i) => (
          <div key={i} style={{ background: G.s1, border: `1px solid ${G.border}`, borderRadius: "8px", padding: "12px 8px", textAlign: "center" }}>
            <div style={{ fontSize: "22px", fontWeight: 700, color: s.col, fontFamily: "monospace" }}>{s.val}</div>
            <div style={{ fontSize: "9px", color: G.muted, fontFamily: "monospace", textTransform: "uppercase", letterSpacing: "0.06em" }}>{s.label}</div>
          </div>
        ))}
      </div>

      {/* Log recente */}
      {log.length > 0 && (
        <div style={{ background: G.s1, border: `1px solid ${G.border}`, borderRadius: "10px", padding: "13px" }}>
          <div style={{ fontSize: "10px", color: G.muted, fontFamily: "monospace", textTransform: "uppercase", letterSpacing: "0.1em", marginBottom: "9px" }}>Ultimi contenuti pubblicati</div>
          <div style={{ display: "grid", gap: "5px" }}>
            {[...log].reverse().slice(0, 3).map((entry, i) => (
              <div key={i} style={{ display: "flex", gap: "8px", alignItems: "center" }}>
                <span style={{ fontSize: "9px", color: CAT.contenuto.c, fontFamily: "monospace", border: `1px solid ${CAT.contenuto.c}30`, padding: "1px 5px", borderRadius: "3px" }}>Format {entry.formato}</span>
                <span style={{ fontSize: "11px", color: G.sub, flex: 1, lineHeight: 1.4 }}>{entry.tema}</span>
                <span style={{ fontSize: "9px", color: G.muted, fontFamily: "monospace", whiteSpace: "nowrap" }}>{entry.ts}</span>
              </div>
            ))}
          </div>
        </div>
      )}
    </div>
  );
}

          <div style={{ fontSize: "16px", fontWeight: 700, color: tema.c, fontFamily: "monospace" }}>{tema.n}</div>
        </div>
        <div style={{ flex: 1 }}>
          <div style={{ fontSize: "14px", fontWeight: 600, color: G.text, marginBottom: "1px" }}>{tema.titolo}</div>
          <div style={{ fontSize: "10px", color: G.muted, fontFamily: "monospace" }}>{done}/{items.length} · Ciclo {cycle}</div>
        </div>
        <button onClick={() => setShowReset(!showReset)} style={{ background: "none", border: `1px solid ${G.border}`, color: G.muted, borderRadius: "6px", padding: "6px 8px", cursor: "pointer" }}>
          <RotateCcw size={13} />
        </button>
      </div>

      {showReset && (
        <div style={{ background: "#150a0a", border: "1px solid #E87A7A30", borderRadius: "8px", padding: "12px 14px", marginBottom: "12px" }}>
          <div style={{ fontSize: "12px", color: "#E87A7A", marginBottom: "8px" }}>Resetta tutti i check di questo tema per il ciclo corrente?</div>
          <div style={{ display: "flex", gap: "7px" }}>
            <button onClick={() => { onResetTema(); setShowReset(false); }} style={{ background: "#1a0808", border: "1px solid #E87A7A40", color: "#E87A7A", borderRadius: "5px", padding: "7px 12px", cursor: "pointer", fontSize: "10px", fontFamily: "monospace" }}>Conferma</button>
            <button onClick={() => setShowReset(false)} style={{ background: G.s2, border: `1px solid ${G.border}`, color: G.muted, borderRadius: "5px", padding: "7px 12px", cursor: "pointer", fontSize: "10px", fontFamily: "monospace" }}>Annulla</button>
          </div>
        </div>
      )}

      {/* Filo */}
      <div style={{ background: G.s1, border: `1px solid ${G.border}`, borderRadius: "10px", padding: "13px", marginBottom: "13px" }}>
        <div style={{ fontSize: "10px", color: G.gold, fontFamily: "monospace", textTransform: "uppercase", letterSpacing: "0.1em", marginBottom: "6px" }}>✦ connessione attiva</div>
        <div style={{ fontSize: "12px", color: G.sub, lineHeight: 1.7, marginBottom: "10px" }}>{tema.filo}</div>
        <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: "5px" }}>
          {tema.flow.map((f, i) => (
            <div key={i} style={{ padding: "7px 9px", background: `${CAT[f.cat].c}0e`, border: `1px solid ${CAT[f.cat].c}22`, borderRadius: "5px", display: "flex", alignItems: "center", gap: "6px" }}>
              <Pill cat={f.cat} sm /><span style={{ fontSize: "11px", color: G.muted }}>{f.label}</span>
            </div>
          ))}
        </div>
      </div>

      {/* Contesto: film + artista + libro + blender */}
      <div style={{ display: "grid", gap: "5px", marginBottom: "13px" }}>
        <div style={{ padding: "9px 11px", background: G.s1, border: `1px solid ${G.border}`, borderRadius: "7px" }}>
          <div style={{ display: "flex", gap: "7px", alignItems: "flex-start", marginBottom: "3px" }}>
            <Pill cat="visione" sm />
            <span style={{ fontSize: "11px", fontWeight: 600, color: G.dim }}>{tema.film.t}</span>
          </div>
          <div style={{ fontSize: "11px", color: G.sub, lineHeight: 1.5, paddingLeft: "0", marginBottom: "4px" }}>{tema.film.n}</div>
          {dove && <div style={{ fontSize: "9px", color: G.muted, fontFamily: "monospace" }}>📍 {dove}</div>}
        </div>
        {[
          { cat: "arte", txt: tema.artista },
          { cat: "studio", txt: `${tema.libro.t}: ${tema.libro.cap}` },
          { cat: "blender", txt: tema.blender },
        ].map((d, i) => (
          <div key={i} style={{ padding: "9px 11px", background: G.s1, border: `1px solid ${G.border}`, borderRadius: "7px", display: "flex", gap: "8px", alignItems: "flex-start" }}>
            <Pill cat={d.cat} sm />
            <span style={{ fontSize: "11px", color: G.sub, lineHeight: 1.6 }}>{d.txt}</span>
          </div>
        ))}
      </div>

      {/* Formato contenuto */}
      {formato && (
        <div style={{ background: `${formato.c}0d`, border: `1px solid ${formato.c}30`, borderRadius: "10px", padding: "13px", marginBottom: "13px" }}>
          <div style={{ display: "flex", gap: "8px", alignItems: "center", marginBottom: "7px" }}>
            <span style={{ fontSize: "10px", color: formato.c, fontFamily: "monospace", textTransform: "uppercase", letterSpacing: "0.1em" }}>Format {formato.id}</span>
            <span style={{ fontSize: "12px", fontWeight: 600, color: G.text }}>{formato.nome}</span>
          </div>
          <div style={{ fontSize: "11px", color: G.sub, lineHeight: 1.7, marginBottom: "10px" }}>{tema.formato.suggerimento}</div>
          <div style={{ padding: "9px 11px", background: "#00000050", borderRadius: "6px", marginBottom: "8px" }}>
            <div style={{ fontSize: "9px", color: G.muted, fontFamily: "monospace", textTransform: "uppercase", letterSpacing: "0.1em", marginBottom: "4px" }}>caption suggerita</div>
            <div style={{ fontSize: "11px", color: G.dim, fontStyle: "italic", lineHeight: 1.6 }}>{tema.formato.caption}</div>
            <div style={{ fontSize: "9px", color: G.muted, marginTop: "5px", fontStyle: "italic" }}>↑ Punto di partenza — personalizzala con la tua voce prima di pubblicare.</div>
          </div>
          <div style={{ fontSize: "10px", color: G.muted, fontFamily: "monospace", textTransform: "uppercase", letterSpacing: "0.08em", marginBottom: "6px" }}>struttura del format</div>
          <div style={{ display: "grid", gap: "4px" }}>
            {formato.struttura.map((s, i) => (
              <div key={i} style={{ display: "flex", gap: "8px", fontSize: "11px", color: G.muted }}>
                <span style={{ color: formato.c, fontFamily: "monospace", minWidth: "14px" }}>{i+1}.</span>{s}
              </div>
            ))}
          </div>
        </div>
      )}

      {/* Progress bar */}
      <div style={{ marginBottom: "10px" }}>
        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: "5px" }}>
          <div style={{ fontSize: "10px", color: G.muted, fontFamily: "monospace", textTransform: "uppercase", letterSpacing: "0.1em" }}>
            {percorso === "p1" ? "Strada 1 — Tempo libero" : "Strada 2 — Con cliente"}
          </div>
          <span style={{ fontSize: "11px", color: pct === 100 ? "#6BBF8E" : G.gold, fontFamily: "monospace", fontWeight: 700 }}>{pct}%</span>
        </div>
        <div style={{ height: "3px", background: G.s3, borderRadius: "2px" }}>
          <div style={{ height: "100%", width: `${pct}%`, background: pct === 100 ? "#6BBF8E" : tema.c, borderRadius: "2px", transition: "width 0.4s ease" }} />
        </div>
      </div>

      {/* Checklist */}
      <div style={{ display: "grid", gap: "6px", marginBottom: "14px" }}>
        {items.map(item => {
          const key = makeKey(percorso, makeCK(tema.id, cycle), item.id);
          const checked = !!cl[key];
          const isExpanded = expandedItem === item.id;
          const timeEst = CAT[item.cat]?.[percorso === "p1" ? "t1" : "t2"];

          return (
            <div key={item.id}>
              <div onClick={() => onCheck(key, item)} style={{
                display: "flex", gap: "10px", alignItems: "flex-start",
                padding: "11px 13px", borderRadius: isExpanded ? "9px 9px 0 0" : "9px", cursor: "pointer",
                background: checked ? `${CAT[item.cat].c}10` : G.s1,
                border: `1px solid ${checked ? CAT[item.cat].c + "38" : G.border}`,
                borderBottom: isExpanded ? "none" : undefined,
                transition: "all 0.15s",
              }}>
                <div style={{
                  width: "18px", height: "18px", borderRadius: "50%", flexShrink: 0, marginTop: "2px",
                  border: `2px solid ${checked ? CAT[item.cat].c : G.s3}`,
                  background: checked ? CAT[item.cat].c : "transparent",
                  display: "flex", alignItems: "center", justifyContent: "center", transition: "all 0.15s",
                }}>
                  {checked && <span style={{ fontSize: "10px", color: "#000", fontWeight: 900 }}>✓</span>}
                </div>
                <div style={{ flex: 1 }}>
                  <div style={{ display: "flex", gap: "6px", alignItems: "center", marginBottom: "3px", flexWrap: "wrap" }}>
                    <Pill cat={item.cat} sm />
                    {timeEst && timeEst !== "—" && <span style={{ fontSize: "9px", color: G.muted, fontFamily: "monospace", border: `1px solid ${G.border}`, padding: "1px 5px", borderRadius: "3px" }}>{timeEst}</span>}
                  </div>
                  <div style={{ fontSize: "12px", color: checked ? G.muted : G.dim, lineHeight: 1.6, textDecoration: checked ? "line-through" : "none" }}>{item.txt}</div>
                </div>
                {(item.cat === "analisi" || item.cat === "contenuto") && (
                  <button onClick={e => { e.stopPropagation(); setExpandedItem(isExpanded ? null : item.id); }} style={{ background: isExpanded ? G.s3 : "none", border: `1px solid ${G.border}`, color: G.muted, borderRadius: "4px", padding: "3px 7px", cursor: "pointer", fontSize: "9px", fontFamily: "monospace", flexShrink: 0 }}>
                    {isExpanded ? "▲" : "▼"}
                  </button>
                )}
              </div>

              {/* Inline 7 domande per analisi */}
              {isExpanded && item.cat === "analisi" && (
                <div style={{ background: G.s2, border: `1px solid ${G.border}`, borderTop: "none", borderRadius: "0 0 9px 9px", padding: "12px 13px" }}>
                  <div style={{ fontSize: "10px", color: CAT.analisi.c, fontFamily: "monospace", textTransform: "uppercase", letterSpacing: "0.1em", marginBottom: "9px" }}>7 domande — rispondi per iscritto</div>
                  <div style={{ display: "grid", gap: "8px" }}>
                    {SETTE_DOMANDE.map(d => (
                      <div key={d.n}>
                        <div style={{ display: "flex", gap: "8px", marginBottom: "4px" }}>
                          <span style={{ fontSize: "10px", fontWeight: 700, color: G.gold, fontFamily: "monospace", minWidth: "20px" }}>{d.n}. {d.l}</span>
                          <span style={{ fontSize: "10px", color: G.muted }}>{d.q}</span>
                        </div>
                        <textarea
                          value={setteAns[d.n] || ""}
                          onChange={e => onSaveSetteAnswers(setteKey, { ...setteAns, [d.n]: e.target.value })}
                          placeholder="…"
                          rows={2}
                          style={{ width: "100%", background: G.s1, border: `1px solid ${G.border}`, borderRadius: "5px", padding: "6px 8px", color: G.text, fontSize: "11px", fontFamily: "Georgia, serif", outline: "none", resize: "vertical", boxSizing: "border-box" }}
                          onClick={e => e.stopPropagation()}
                        />
                      </div>
                    ))}
                  </div>
                </div>
              )}

              {/* Inline format expand per contenuto */}
              {isExpanded && item.cat === "contenuto" && formato && (
                <div style={{ background: G.s2, border: `1px solid ${G.border}`, borderTop: "none", borderRadius: "0 0 9px 9px", padding: "12px 13px" }}>
                  <div style={{ fontSize: "10px", color: CAT.contenuto.c, fontFamily: "monospace", textTransform: "uppercase", letterSpacing: "0.1em", marginBottom: "8px" }}>Format {formato.id} — struttura</div>
                  {formato.struttura.map((s, i) => (
                    <div key={i} style={{ display: "flex", gap: "8px", fontSize: "11px", color: G.sub, marginBottom: "5px" }}>
                      <span style={{ color: formato.c, fontFamily: "monospace", minWidth: "14px" }}>{i+1}.</span>{s}
                    </div>
                  ))}
                  <div style={{ marginTop: "8px", padding: "7px 9px", background: G.s1, borderRadius: "5px" }}>
                    <div style={{ fontSize: "9px", color: G.muted, marginBottom: "3px", fontFamily: "monospace" }}>hook</div>
                    <div style={{ fontSize: "11px", color: G.dim, fontStyle: "italic" }}>{formato.hook}</div>
                  </div>
                </div>
              )}
            </div>
          );
        })}
      </div>

      {/* Riflessione post-tema */}
      {isComplete && (
        <div style={{ background: "#0a1a14", border: "1px solid #6BBF8E40", borderRadius: "10px", padding: "14px", marginBottom: "14px" }}>
          <div style={{ fontSize: "10px", color: "#6BBF8E", fontFamily: "monospace", textTransform: "uppercase", letterSpacing: "0.1em", marginBottom: "4px" }}>✓ Tema completato</div>
          {!rifSaved ? (
            <>
              <div style={{ fontSize: "12px", color: G.sub, lineHeight: 1.6, marginBottom: "12px" }}>5 minuti per consolidare prima di passare avanti.</div>
              {RIFLESSIONI_Q.map((q, i) => (
                <div key={i} style={{ marginBottom: "10px" }}>
                  <div style={{ fontSize: "11px", color: G.dim, marginBottom: "5px", lineHeight: 1.5 }}>{i + 1}. {q}</div>
                  <textarea value={rifInput[i]} onChange={e => { const n = [...rifInput]; n[i] = e.target.value; setRifInput(n); }} placeholder="Scrivi qui…" rows={2} style={{ width: "100%", background: G.s1, border: `1px solid ${G.border}`, borderRadius: "6px", padding: "8px 10px", color: G.text, fontSize: "12px", fontFamily: "Georgia, serif", outline: "none", resize: "vertical", boxSizing: "border-box" }} />
                </div>
              ))}
              <button onClick={() => { if (rifInput.some(r => r.trim())) { onSaveRiflessione(rifKey, rifInput.filter(r => r.trim())); setRifSaved(true); } }} style={{ background: "#6BBF8E", color: "#000", border: "none", padding: "9px 16px", borderRadius: "7px", cursor: "pointer", fontSize: "11px", fontFamily: "monospace", fontWeight: 700 }}>Salva e avanza ciclo →</button>
            </>
          ) : (
            <div style={{ fontSize: "12px", color: "#6BBF8E" }}>Riflessione salvata. Ciclo {cycle} completato.</div>
          )}
        </div>
      )}

      {/* Riflessioni storici */}
      {rifStorici.length > 0 && (
        <div style={{ background: G.s1, border: `1px solid ${G.border}`, borderRadius: "10px", padding: "13px", marginBottom: "13px" }}>
          <button onClick={() => setShowRifStorici(!showRifStorici)} style={{ display: "flex", width: "100%", justifyContent: "space-between", background: "none", border: "none", color: G.dim, cursor: "pointer", padding: 0, fontSize: "10px", fontFamily: "monospace", textTransform: "uppercase", letterSpacing: "0.1em" }}>
            <span>Riflessioni cicli precedenti ({rifStorici.length})</span>
            <span>{showRifStorici ? "▲" : "▼"}</span>
          </button>
          {showRifStorici && (
            <div style={{ marginTop: "10px", display: "grid", gap: "10px" }}>
              {rifStorici.map(rs => (
                <div key={rs.ciclo} style={{ padding: "10px", background: G.s2, borderRadius: "6px", borderLeft: `3px solid ${tema.c}50` }}>
                  <div style={{ fontSize: "9px", color: tema.c, fontFamily: "monospace", textTransform: "uppercase", marginBottom: "6px" }}>Ciclo {rs.ciclo}</div>
                  {rs.risposte.map((r, i) => (
                    <div key={i} style={{ marginBottom: "5px" }}>
                      <div style={{ fontSize: "9px", color: G.muted, fontFamily: "monospace", marginBottom: "2px" }}>{RIFLESSIONI_Q[i]}</div>
                      <div style={{ fontSize: "11px", color: G.sub, lineHeight: 1.5 }}>{r}</div>
                    </div>
                  ))}
                </div>
              ))}
            </div>
          )}
        </div>
      )}

      {/* Note */}
      <div style={{ background: G.s1, border: `1px solid ${G.border}`, borderRadius: "10px", padding: "13px", marginBottom: "8px" }}>
        <div style={{ fontSize: "10px", color: G.muted, fontFamily: "monospace", textTransform: "uppercase", letterSpacing: "0.1em", marginBottom: "9px" }}>Note personali</div>
        <div style={{ display: "grid", gap: "5px", marginBottom: "8px" }}>
          {noteList.map((n, i) => (
            <div key={i} style={{ display: "flex", gap: "8px", padding: "8px 10px", background: G.s2, borderRadius: "5px" }}>
              <div style={{ flex: 1 }}>
                <div style={{ fontSize: "12px", color: G.sub, lineHeight: 1.5 }}>{n.txt}</div>
                <div style={{ fontSize: "9px", color: G.muted, fontFamily: "monospace", marginTop: "2px" }}>{n.ts}</div>
              </div>
              <button onClick={() => onDeleteNote(noteKey, i)} style={{ background: "none", border: "none", color: G.muted, cursor: "pointer", padding: "2px" }}><Trash2 size={12} /></button>
            </div>
          ))}
        </div>
        <div style={{ display: "flex", gap: "6px" }}>
          <input value={noteInput[noteKey] || ""} onChange={e => setNoteInput(p => ({ ...p, [noteKey]: e.target.value }))} onKeyDown={e => e.key === "Enter" && onAddNote(noteKey)} placeholder="Aggiungi una nota…" style={{ flex: 1, background: G.s2, border: `1px solid ${G.border}`, borderRadius: "6px", padding: "8px 10px", color: G.text, fontSize: "12px", fontFamily: "Georgia, serif", outline: "none" }} />
          <button onClick={() => onAddNote(noteKey)} style={{ background: G.s3, border: `1px solid ${G.border}`, color: G.dim, borderRadius: "6px", padding: "8px 12px", cursor: "pointer" }}><Plus size={14} /></button>
        </div>
      </div>
    </div>
  );
}


// ─── TEMI ─────────────────────────────────────────────────────────────────────
function TemiView({ temaIdx, cl, percorso, cycles, setTemaIdx, setTab }) {
  const [gruppoAperto, setGruppoAperto] = useState(
    GRUPPI_TEMI.findIndex(g => temaIdx >= g.idxRange[0] && temaIdx <= g.idxRange[1])
  );

  return (
    <div style={{ padding: "18px 18px 0" }}>
      <div style={{ fontSize: "10px", color: G.muted, fontFamily: "monospace", textTransform: "uppercase", letterSpacing: "0.15em", marginBottom: "4px" }}>24 temi rotativi</div>
      <h2 style={{ fontSize: "17px", fontWeight: 400, color: G.text, margin: "0 0 5px", letterSpacing: "-0.02em" }}>Scegli il tema</h2>
      <p style={{ fontSize: "12px", color: G.muted, margin: "0 0 16px", lineHeight: 1.6 }}>
        5 gruppi tematici, 24 temi. Al secondo ciclo dello stesso tema sei su un livello diverso — più connessioni, più profondità.
      </p>

      <div style={{ display: "grid", gap: "8px" }}>
        {GRUPPI_TEMI.map((gruppo, gi) => {
          const isOpen = gruppoAperto === gi;
          const temiGruppo = TEMI.slice(gruppo.idxRange[0], gruppo.idxRange[1] + 1);
          const attivoCheContiene = temaIdx >= gruppo.idxRange[0] && temaIdx <= gruppo.idxRange[1];
          const completatiGruppo = temiGruppo.filter(t => {
            const c = cycles[t.id] || 1;
            const items = percorso === "p1" ? t.p1 : t.p2;
            return items.every(i => cl[makeKey(percorso, makeCK(t.id, c), i.id)]);
          }).length;

          return (
            <div key={gi} style={{ border: `1px solid ${isOpen || attivoCheContiene ? gruppo.c + "40" : G.border}`, borderRadius: "10px", overflow: "hidden" }}>
              {/* Gruppo header */}
              <div onClick={() => setGruppoAperto(isOpen ? -1 : gi)} style={{ display: "flex", alignItems: "center", gap: "11px", padding: "12px 14px", cursor: "pointer", background: isOpen ? `${gruppo.c}0e` : G.s1, borderLeft: `4px solid ${gruppo.c}` }}>
                <div style={{ flex: 1 }}>
                  <div style={{ fontSize: "12px", fontWeight: 700, color: G.text, marginBottom: "2px" }}>{gruppo.nome}</div>
                  <div style={{ fontSize: "10px", color: G.muted, fontFamily: "monospace" }}>
                    Temi {gruppo.idxRange[0] + 1}–{gruppo.idxRange[1] + 1}
                    {attivoCheContiene && <span style={{ marginLeft: "7px", color: gruppo.c }}>· attivo</span>}
                    <span style={{ marginLeft: "7px" }}>{completatiGruppo}/{temiGruppo.length} completati</span>
                  </div>
                </div>
                {/* Mini progress bar per gruppo */}
                <div style={{ width: "50px", height: "3px", background: G.border, borderRadius: "2px", overflow: "hidden" }}>
                  <div style={{ height: "100%", width: `${(completatiGruppo / temiGruppo.length) * 100}%`, background: gruppo.c, transition: "width 0.3s" }} />
                </div>
                <span style={{ color: G.muted, fontSize: "12px", transform: isOpen ? "rotate(180deg)" : "none", transition: "transform 0.2s" }}>↓</span>
              </div>

              {/* Lista temi del gruppo */}
              {isOpen && (
                <div style={{ background: G.bg, borderTop: `1px solid ${G.border}`, padding: "8px" }}>
                  <div style={{ display: "grid", gap: "5px" }}>
                    {temiGruppo.map((t, localIdx) => {
                      const i = gruppo.idxRange[0] + localIdx;
                      const isActive = i === temaIdx;
                      const thisCycle = cycles[t.id] || 1;
                      const items = percorso === "p1" ? t.p1 : t.p2;
                      const done = items.filter(it => cl[makeKey(percorso, makeCK(t.id, thisCycle), it.id)]).length;
                      const pct = items.length ? Math.round((done / items.length) * 100) : 0;
                      const prevCycles = thisCycle - 1;
                      const fmt = FORMATI.find(f => f.id === t.formato.id);

                      return (
                        <div key={t.id} style={{ background: isActive ? `${t.c}12` : G.s1, border: `1px solid ${isActive ? t.c + "45" : G.border}`, borderLeft: `3px solid ${isActive ? t.c : pct === 100 ? "#6BBF8E" : G.s3}`, borderRadius: "7px", overflow: "hidden" }}>
                          <div style={{ padding: "10px 12px", display: "flex", gap: "10px", alignItems: "center" }}>
                            <div style={{ fontSize: "16px", fontWeight: 700, color: isActive ? t.c : G.muted, fontFamily: "monospace", minWidth: "22px" }}>{t.n}</div>
                            <div style={{ flex: 1 }}>
                              <div style={{ display: "flex", gap: "5px", alignItems: "center", marginBottom: "2px", flexWrap: "wrap" }}>
                                <span style={{ fontSize: "12px", fontWeight: 600, color: G.text }}>{t.titolo}</span>
                                {isActive && <span style={{ fontSize: "9px", color: t.c, border: `1px solid ${t.c}40`, padding: "1px 5px", borderRadius: "3px", fontFamily: "monospace", textTransform: "uppercase" }}>attivo</span>}
                                {prevCycles > 0 && <span style={{ fontSize: "9px", color: G.muted, fontFamily: "monospace", border: `1px solid ${G.border}`, padding: "1px 5px", borderRadius: "3px" }}>×{prevCycles}</span>}
                                {fmt && <span style={{ fontSize: "9px", color: fmt.c, border: `1px solid ${fmt.c}30`, padding: "1px 5px", borderRadius: "3px", fontFamily: "monospace" }}>{fmt.id}</span>}
                              </div>
                              <div style={{ fontSize: "10px", color: G.muted, fontStyle: "italic" }}>{t.tagline}</div>
                            </div>
                            <div style={{ flexShrink: 0 }}>
                              {!isActive ? (
                                <button onClick={() => { setTemaIdx(i); setTab("settimana"); }} style={{ background: G.s2, border: `1px solid ${G.border}`, color: G.dim, borderRadius: "5px", padding: "5px 9px", cursor: "pointer", fontSize: "10px", fontFamily: "monospace" }}>Imposta →</button>
                              ) : (
                                <button onClick={() => setTab("settimana")} style={{ background: t.c, border: "none", color: "#000", borderRadius: "5px", padding: "5px 9px", cursor: "pointer", fontSize: "10px", fontFamily: "monospace", fontWeight: 700 }}>Apri →</button>
                              )}
                            </div>
                          </div>
                          <div style={{ height: "2px", background: G.border }}>
                            <div style={{ height: "100%", width: `${pct}%`, background: t.c, transition: "width 0.3s" }} />
                          </div>
                        </div>
                      );
                    })}
                  </div>
                </div>
              )}
            </div>
          );
        })}
      </div>
    </div>
  );
}

// ─── RISORSE ──────────────────────────────────────────────────────────────────
function RisorseView({ libroStati, onToggleLibro, log }) {
  const [sub, setSub] = useState("formati");

  const sette = [
    { n:"1", l:"Linea", q:"C'è contorno? È uniforme o varia? Segno grafico o pittorico?" },
    { n:"2", l:"Forma", q:"Geometrica o organica? Quanto semplificata rispetto alla realtà?" },
    { n:"3", l:"Colore", q:"Quante tinte? Palette limitata? Le ombre sono colorate o grigie?" },
    { n:"4", l:"Texture", q:"Piatte, pittoriche, rumorose? C'è grain intenzionale?" },
    { n:"5", l:"Luce", q:"Segue la fisica o è arbitraria? Da dove viene? Quante fonti?" },
    { n:"6", l:"Movimento", q:"Smears? Pose held? Frame rate intenzionale?" },
    { n:"7", l:"Origine", q:"Da quale tradizione artistica o culturale viene storicamente?" },
  ];

  return (
    <div style={{ padding: "18px 18px 0" }}>
      <div style={{ display: "flex", gap: "0", marginBottom: "16px", border: `1px solid ${G.border}`, borderRadius: "8px", overflow: "hidden" }}>
        {["formati", "7 domande", "libri", "log"].map(s => (
          <button key={s} onClick={() => setSub(s)} style={{ flex: 1, padding: "8px 4px", background: sub === s ? G.s3 : G.s1, border: "none", borderRight: `1px solid ${G.border}`, color: sub === s ? G.text : G.muted, cursor: "pointer", fontSize: "9px", fontFamily: "monospace", textTransform: "uppercase", letterSpacing: "0.06em" }}>{s}</button>
        ))}
      </div>

      {sub === "formati" && (
        <div style={{ display: "grid", gap: "12px" }}>
          <p style={{ fontSize: "12px", color: G.muted, lineHeight: 1.7, margin: "0 0 4px", fontStyle: "italic" }}>
            Ogni contenuto ruota attorno allo storytelling visivo: come la luce, lo stile, una texture o uno spazio racconta una storia. Questi 3 format coprono approcci diversi allo stesso principio.
          </p>
          {FORMATI.map(f => (
            <div key={f.id} style={{ background: G.s1, border: `1px solid ${f.c}30`, borderLeft: `4px solid ${f.c}`, borderRadius: "10px", padding: "14px 15px" }}>
              <div style={{ display: "flex", gap: "8px", alignItems: "center", marginBottom: "6px" }}>
                <span style={{ fontSize: "13px", fontWeight: 700, color: f.c, fontFamily: "monospace" }}>{f.id}</span>
                <span style={{ fontSize: "13px", fontWeight: 600, color: G.text }}>{f.nome}</span>
                <span style={{ fontSize: "10px", color: G.muted, fontStyle: "italic" }}>— {f.tagline}</span>
              </div>
              <div style={{ fontSize: "12px", color: G.sub, lineHeight: 1.7, marginBottom: "10px" }}>{f.desc}</div>
              <div style={{ padding: "9px 11px", background: `${f.c}0c`, borderRadius: "6px", marginBottom: "8px" }}>
                <div style={{ fontSize: "9px", color: f.c, fontFamily: "monospace", textTransform: "uppercase", letterSpacing: "0.1em", marginBottom: "4px" }}>hook di esempio</div>
                <div style={{ fontSize: "11px", color: G.dim, fontStyle: "italic" }}>{f.hook}</div>
              </div>
              <div style={{ fontSize: "10px", color: G.muted, fontFamily: "monospace", textTransform: "uppercase", letterSpacing: "0.08em", marginBottom: "7px" }}>struttura</div>
              <div style={{ display: "grid", gap: "4px" }}>
                {f.struttura.map((s, i) => (
                  <div key={i} style={{ display: "flex", gap: "8px", fontSize: "11px", color: G.sub }}>
                    <span style={{ color: f.c, fontFamily: "monospace", minWidth: "14px" }}>{i+1}.</span>{s}
                  </div>
                ))}
              </div>
            </div>
          ))}
        </div>
      )}

      {sub === "7 domande" && (
        <div>
          <p style={{ fontSize: "12px", color: G.muted, lineHeight: 1.7, marginBottom: "14px", fontStyle: "italic" }}>Applicale ogni settimana a una scena del film. Rispondi per iscritto — anche in modo grezzo. Le domande ti forzano a guardare davvero invece di vedere passivamente.</p>
          <div style={{ display: "grid", gap: "7px", marginBottom: "14px" }}>
            {sette.map((d, i) => (
              <div key={i} style={{ padding: "11px 13px", background: G.s1, border: `1px solid ${G.border}`, borderRadius: "7px", display: "flex", gap: "11px" }}>
                <div style={{ minWidth: "46px" }}>
                  <div style={{ fontSize: "15px", fontWeight: 700, color: G.gold, fontFamily: "monospace" }}>{d.n}</div>
                  <div style={{ fontSize: "9px", color: G.gold, fontFamily: "monospace", textTransform: "uppercase", letterSpacing: "0.08em" }}>{d.l}</div>
                </div>
                <div style={{ fontSize: "12px", color: G.sub, lineHeight: 1.7, paddingTop: "1px" }}>{d.q}</div>
              </div>
            ))}
          </div>
          <div style={{ padding: "12px 14px", background: G.s1, border: `1px solid ${G.border}`, borderLeft: `3px solid ${G.gold}`, borderRadius: "7px" }}>
            <div style={{ fontSize: "10px", color: G.gold, fontFamily: "monospace", textTransform: "uppercase", marginBottom: "5px" }}>connessione con i format</div>
            <div style={{ fontSize: "12px", color: G.muted, lineHeight: 1.7 }}>Le 7 domande alimentano direttamente i format. Domanda 5 (luce) → Format B (Prima/Dopo). Domanda 7 (origine) → Format A (Film→Arte→3D). Domanda 1 o 2 isolata → Format C (Principio Nascosto).</div>
          </div>
        </div>
      )}

      {sub === "libri" && (
        <div style={{ display: "grid", gap: "8px" }}>
          {LIBRI.map(libro => {
            const stato = libroStati[libro.id];
            return (
              <div key={libro.id} style={{ padding: "12px 13px", background: G.s1, border: `1px solid ${stato === "letto" ? "#6BBF8E30" : stato === "corso" ? "#E8C54730" : G.border}`, borderLeft: `3px solid ${stato === "letto" ? "#6BBF8E" : stato === "corso" ? G.gold : G.border}`, borderRadius: "8px" }}>
                <div style={{ display: "flex", gap: "10px", alignItems: "flex-start" }}>
                  <div style={{ flex: 1 }}>
                    <div style={{ fontSize: "13px", fontWeight: 600, color: G.text, marginBottom: "2px" }}>{libro.t}</div>
                    <div style={{ fontSize: "10px", color: G.muted, marginBottom: "3px" }}>— {libro.a}{libro.it && ` / "${libro.it}"`}</div>
                    <div style={{ fontSize: "9px", color: "#E8C54770", fontFamily: "monospace", marginBottom: "4px" }}>→ {libro.quando}</div>
                    <div style={{ fontSize: "11px", color: G.sub, lineHeight: 1.5 }}>{libro.perche}</div>
                  </div>
                  <div style={{ display: "flex", flexDirection: "column", gap: "4px", flexShrink: 0 }}>
                    <button onClick={() => onToggleLibro(libro.id, "corso")} style={{ background: stato === "corso" ? "#33220080" : "none", border: `1px solid ${stato === "corso" ? G.gold : G.border}`, color: stato === "corso" ? G.gold : G.muted, borderRadius: "4px", padding: "3px 8px", cursor: "pointer", fontSize: "9px", fontFamily: "monospace" }}>▶ corso</button>
                    <button onClick={() => onToggleLibro(libro.id, "letto")} style={{ background: stato === "letto" ? "#00330080" : "none", border: `1px solid ${stato === "letto" ? "#6BBF8E" : G.border}`, color: stato === "letto" ? "#6BBF8E" : G.muted, borderRadius: "4px", padding: "3px 8px", cursor: "pointer", fontSize: "9px", fontFamily: "monospace" }}>✓ letto</button>
                  </div>
                </div>
              </div>
            );
          })}
        </div>
      )}

      {sub === "log" && (
        <div>
          <div style={{ fontSize: "11px", color: G.muted, marginBottom: "12px", lineHeight: 1.6 }}>Ogni contenuto pubblicato viene registrato qui. La tua storia di contenuto visivo nel tempo.</div>
          {log.length === 0 ? (
            <div style={{ padding: "20px", textAlign: "center", color: G.muted, fontSize: "12px", fontStyle: "italic" }}>Ancora nessun contenuto registrato. Completa l'attività "contenuto" in Settimana.</div>
          ) : (
            <>
              {/* Distribuzione format */}
              <div style={{ background: G.s1, border: `1px solid ${G.border}`, borderRadius: "9px", padding: "13px", marginBottom: "12px" }}>
                <div style={{ fontSize: "10px", color: G.muted, fontFamily: "monospace", textTransform: "uppercase", letterSpacing: "0.1em", marginBottom: "10px" }}>Distribuzione format</div>
                <div style={{ display: "grid", gap: "7px" }}>
                  {FORMATI.map(f => {
                    const count = log.filter(e => e.formato === f.id).length;
                    const pct = log.length ? Math.round((count / log.length) * 100) : 0;
                    return (
                      <div key={f.id} style={{ display: "flex", alignItems: "center", gap: "8px" }}>
                        <span style={{ fontSize: "9px", color: f.c, fontFamily: "monospace", fontWeight: 700, border: `1px solid ${f.c}30`, padding: "1px 6px", borderRadius: "3px", minWidth: "60px", textAlign: "center" }}>Format {f.id}</span>
                        <div style={{ flex: 1, height: "4px", background: G.s3, borderRadius: "2px", overflow: "hidden" }}>
                          <div style={{ height: "100%", width: `${pct}%`, background: f.c, borderRadius: "2px", transition: "width 0.4s ease" }} />
                        </div>
                        <span style={{ fontSize: "10px", color: G.muted, fontFamily: "monospace", minWidth: "36px", textAlign: "right" }}>{count}× ({pct}%)</span>
                      </div>
                    );
                  })}
                </div>
                {FORMATI.some(f => log.filter(e => e.formato === f.id).length === 0) && (
                  <div style={{ fontSize: "10px", color: G.muted, fontStyle: "italic", marginTop: "8px" }}>
                    ↑ Hai format non ancora usati — variare aiuta a sviluppare approcci diversi allo storytelling visivo.
                  </div>
                )}
              </div>

              {/* Lista log */}
              <div style={{ display: "grid", gap: "6px" }}>
                {[...log].reverse().map((entry, i) => (
                  <div key={i} style={{ padding: "10px 12px", background: G.s1, border: `1px solid ${G.border}`, borderRadius: "7px", display: "flex", gap: "9px", alignItems: "flex-start" }}>
                    <span style={{ fontSize: "9px", color: FORMATI.find(f => f.id === entry.formato)?.c || G.gold, border: `1px solid ${(FORMATI.find(f => f.id === entry.formato)?.c || G.gold) + "40"}`, padding: "2px 7px", borderRadius: "3px", fontFamily: "monospace", flexShrink: 0 }}>Format {entry.formato}</span>
                    <div style={{ flex: 1 }}>
                      <div style={{ fontSize: "11px", color: G.text, lineHeight: 1.5, marginBottom: "2px" }}>{entry.tema}</div>
                      <div style={{ fontSize: "9px", color: G.muted, fontFamily: "monospace" }}>{entry.ts}</div>
                    </div>
                  </div>
                ))}
              </div>
            </>
          )}
        </div>
      )}
    </div>
  );
}

// ─── APP ──────────────────────────────────────────────────────────────────────
function App() {
  const [tab, setTab] = useState("home");
  const [percorso, setPercorso] = useState("p1");
  const [temaIdx, setTemaIdx] = useState(0);
  const [cycles, setCycles] = useState({});
  const [cl, setCl] = useState({});
  const [libroStati, setLibroStati] = useState({});
  const [note, setNote] = useState({});
  const [noteInput, setNoteInput] = useState({});
  const [riflessioni, setRiflessioni] = useState({});
  const [log, setLog] = useState([]);
  const [checkDates, setCheckDates] = useState({});
  const [setteAnswers, setSetteAnswers] = useState({});
  const [onboarded, setOnboarded] = useState(true); // true = skip until loaded
  const [percorsoWarn, setPercorsoWarn] = useState(false);
  const [ready, setReady] = useState(false);

  useEffect(() => {
    (async () => {
      const [p, ti, cy, c, ls, n, r, l, cd, sa, ob] = await Promise.all([
        restore("percorso", "p1"), restore("temaIdx", 0), restore("cycles", {}),
        restore("cl_v3", {}), restore("libroStati", {}), restore("note_v3", {}),
        restore("riflessioni_v3", {}), restore("log_v3", []),
        restore("checkDates", {}), restore("setteAnswers", {}),
        restore("onboarded", false),
      ]);
      setPercorso(p); setTemaIdx(ti); setCycles(cy); setCl(c);
      setLibroStati(ls); setNote(n); setRiflessioni(r); setLog(l);
      setCheckDates(cd); setSetteAnswers(sa); setOnboarded(ob);
      setReady(true);
    })();
  }, []);

  const tema = TEMI[temaIdx];
  const cycle = cycles[tema.id] || 1;

  const stats = {
    cicliTotali: Object.values(cycles).reduce((s, v) => s + Math.max(0, v - 1), 0),
    contenuti: log.length,
    temiDone: TEMI.filter(t => {
      const c = cycles[t.id] || 1;
      const items = percorso === "p1" ? t.p1 : t.p2;
      return items.length > 0 && items.every(i => cl[makeKey(percorso, makeCK(t.id, c), i.id)]);
    }).length,
  };

  const onCheck = useCallback(async (key, item) => {
    const next = { ...cl, [key]: !cl[key] };
    setCl(next); await persist("cl_v3", next);
    // Track date of check
    if (!cl[key]) {
      const nextDates = { ...checkDates, [key]: new Date().toLocaleDateString("it-IT") };
      setCheckDates(nextDates); await persist("checkDates", nextDates);
    }
    if (item.cat === "contenuto" && !cl[key]) {
      const entry = { formato: tema.formato.id, tema: tema.titolo, ts: new Date().toLocaleDateString("it-IT") };
      const nextLog = [...log, entry];
      setLog(nextLog); await persist("log_v3", nextLog);
    }
  }, [cl, log, tema, checkDates]);

  const onResetTema = useCallback(async () => {
    const prefix = makeKey(percorso, makeCK(tema.id, cycle), "");
    const next = Object.fromEntries(Object.entries(cl).filter(([k]) => !k.startsWith(prefix)));
    setCl(next); await persist("cl_v3", next);
    const nextDates = Object.fromEntries(Object.entries(checkDates).filter(([k]) => !k.startsWith(prefix)));
    setCheckDates(nextDates); await persist("checkDates", nextDates);
  }, [cl, percorso, tema, cycle, checkDates]);

  const onToggleLibro = useCallback(async (id, stato) => {
    const next = { ...libroStati, [id]: libroStati[id] === stato ? null : stato };
    setLibroStati(next); await persist("libroStati", next);
  }, [libroStati]);

  const onAddNote = useCallback(async (key) => {
    const txt = (noteInput[key] || "").trim();
    if (!txt) return;
    const next = { ...note, [key]: [...(note[key] || []), { txt, ts: new Date().toLocaleDateString("it-IT") }] };
    setNote(next); setNoteInput(p => ({ ...p, [key]: "" })); await persist("note_v3", next);
  }, [note, noteInput]);

  const onDeleteNote = useCallback(async (key, idx) => {
    const next = { ...note, [key]: note[key].filter((_, i) => i !== idx) };
    setNote(next); await persist("note_v3", next);
  }, [note]);

  const onSaveRiflessione = useCallback(async (rifKey, risposte) => {
    const next = { ...riflessioni, [rifKey]: risposte };
    setRiflessioni(next); await persist("riflessioni_v3", next);
    const nextCycles = { ...cycles, [tema.id]: (cycles[tema.id] || 1) + 1 };
    setCycles(nextCycles); await persist("cycles", nextCycles);
  }, [riflessioni, cycles, tema]);

  const onSaveSetteAnswers = useCallback(async (key, answers) => {
    const next = { ...setteAnswers, [key]: answers };
    setSetteAnswers(next); await persist("setteAnswers", next);
  }, [setteAnswers]);

  const setPercorsoAndSave = async (p) => {
    // Warn if switching mid-theme with partial progress
    const items = percorso === "p1" ? tema.p1 : tema.p2;
    const done = items.filter(i => cl[makeKey(percorso, makeCK(tema.id, cycle), i.id)]).length;
    if (done > 0 && done < items.length) setPercorsoWarn(true);
    setPercorso(p); await persist("percorso", p);
  };

  const setTemaIdxAndSave = useCallback(async (i) => {
    setTemaIdx(i); await persist("temaIdx", i);
  }, []);

  const completeOnboarding = async () => {
    setOnboarded(true); await persist("onboarded", true);
  };

  if (!ready) return (
    <div style={{ background: G.bg, minHeight: "100vh", display: "flex", alignItems: "center", justifyContent: "center" }}>
      <div style={{ color: G.muted, fontFamily: "monospace", fontSize: "12px" }}>Caricamento…</div>
    </div>
  );

  const navItems = [
    { id: "home", icon: <Home size={17} />, label: "Home" },
    { id: "settimana", icon: <Calendar size={17} />, label: "Settimana" },
    { id: "temi", icon: <Grid size={17} />, label: "Temi" },
    { id: "risorse", icon: <BookOpen size={17} />, label: "Risorse" },
  ];

  return (
    <div style={{ background: G.bg, minHeight: "100vh", color: G.text, fontFamily: "Georgia, 'Times New Roman', serif", paddingBottom: "calc(68px + env(safe-area-inset-bottom, 0px))" }}>

      {/* Onboarding — primo avvio */}
      {!onboarded && <OnboardingModal onDone={completeOnboarding} />}

      {/* Header */}
      <div style={{ position: "sticky", top: 0, zIndex: 100, background: `${G.bg}f2`, backdropFilter: "blur(14px)", borderBottom: `1px solid ${G.border}`, padding: "calc(env(safe-area-inset-top, 0px) + 10px) 18px 10px", display: "flex", alignItems: "center", justifyContent: "space-between" }}>
        <div>
          <div style={{ fontSize: "10px", color: G.muted, fontFamily: "monospace", textTransform: "uppercase", letterSpacing: "0.15em", lineHeight: 1 }}>Creative Director Path</div>
          <div style={{ fontSize: "12px", color: G.sub, fontStyle: "italic", lineHeight: 1.2, marginTop: "2px" }}>
            <span style={{ color: tema.c }}>{tema.titolo}</span>
            <span style={{ color: G.muted }}> · C{cycle}</span>
          </div>
        </div>
        <div style={{ display: "flex", gap: "0", border: `1px solid ${G.border}`, borderRadius: "6px", overflow: "hidden" }}>
          {[{ id: "p1", l: "Libero" }, { id: "p2", l: "Lavoro" }].map(p => (
            <button key={p.id} onClick={() => setPercorsoAndSave(p.id)} style={{ padding: "5px 11px", background: percorso === p.id ? G.s3 : "none", border: "none", color: percorso === p.id ? G.text : G.muted, cursor: "pointer", fontSize: "10px", fontFamily: "monospace", textTransform: "uppercase", letterSpacing: "0.05em" }}>{p.l}</button>
          ))}
        </div>
      </div>

      {/* Percorso switch warning */}
      {percorsoWarn && (
        <div style={{ background: "#1a1200", border: "1px solid #E8C54730", borderRadius: "0", padding: "9px 18px", display: "flex", alignItems: "center", justifyContent: "space-between", gap: "10px" }}>
          <div style={{ fontSize: "11px", color: "#E8C54790", lineHeight: 1.5 }}>
            Hai cambiato percorso a metà tema. I check dei due percorsi sono separati — il progresso in Libero non si trasferisce a Lavoro e viceversa.
          </div>
          <button onClick={() => setPercorsoWarn(false)} style={{ background: "none", border: "none", color: G.muted, cursor: "pointer", fontSize: "14px", flexShrink: 0, padding: "2px 4px" }}>×</button>
        </div>
      )}

      {tab === "home" && <HomeView tema={tema} percorso={percorso} cl={cl} cycle={cycle} setTab={setTab} log={log} stats={stats} checkDates={checkDates} />}
      {tab === "settimana" && <SettimanaView tema={tema} percorso={percorso} cl={cl} cycle={cycle} onCheck={onCheck} note={note} noteInput={noteInput} setNoteInput={setNoteInput} onAddNote={onAddNote} onDeleteNote={onDeleteNote} onResetTema={onResetTema} onSaveRiflessione={onSaveRiflessione} riflessioni={riflessioni} setteAnswers={setteAnswers} onSaveSetteAnswers={onSaveSetteAnswers} />}
      {tab === "temi" && <TemiView temaIdx={temaIdx} cl={cl} percorso={percorso} cycles={cycles} setTemaIdx={setTemaIdxAndSave} setTab={setTab} />}
      {tab === "risorse" && <RisorseView libroStati={libroStati} onToggleLibro={onToggleLibro} log={log} />}

      {/* Bottom nav */}
      <div style={{ position: "fixed", bottom: 0, left: 0, right: 0, zIndex: 100, background: `${G.bg}f5`, backdropFilter: "blur(14px)", borderTop: `1px solid ${G.border}`, display: "flex", flexDirection: "column", paddingBottom: "env(safe-area-inset-bottom, 0px)" }}>
        {navItems.map(item => (
          <button key={item.id} onClick={() => setTab(item.id)} style={{ flex: 1, display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center", gap: "3px", padding: "9px 4px", background: "none", border: "none", color: tab === item.id ? G.gold : G.muted, cursor: "pointer", borderTop: tab === item.id ? `2px solid ${G.gold}` : "2px solid transparent", transition: "color 0.15s" }}>
            {item.icon}
            <span style={{ fontSize: "9px", fontFamily: "monospace", textTransform: "uppercase", letterSpacing: "0.04em" }}>{item.label}</span>
          </button>
        ))}
      </div>
    </div>
  );
}


    // ─── MOUNT ───────────────────────────────────────────────────────────────
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>

  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('sw.js')
          .then(r => console.log('SW registered'))
          .catch(e => console.log('SW failed', e));
      });
    }
  </script>
</body>
</html>
